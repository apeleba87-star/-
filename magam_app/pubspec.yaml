name: magam_app
description: 마감링크 — 구인·도급 공고 링크 공유 · 마감하면 연락처 비공개
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_links: ^6.4.0
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.1
  go_router: ^16.0.0
  flutter_dotenv: ^5.2.1
  http: ^1.4.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#1A234E"
  adaptive_icon_foreground: assets/icon/app_icon.png
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#1A234E"
    theme_color: "#1A234E"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/app_icon.png
